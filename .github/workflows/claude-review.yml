name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    # Run on all PRs, or when @claude is mentioned in a comment
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git diff origin/main

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 5"
          prompt: |
            You are reviewing a pull request for an ML research pipeline that forecasts
            building energy loads (Norwegian public buildings, LightGBM/DL models, H+1 and H+24
            horizons, Oslo generalisation study, FastAPI deployment).

            Read the checklist at .claude/commands/review-checklist.md and run a 2-pass review
            of the diff against main.

            Pass 1 — CRITICAL (blocks deployment):
            - Data Leakage & Feature Safety (shift(1), scaler fit on train-only, lag < forecast_horizon,
              OOF gap >= 168)
            - Model Trust Boundary (building_id path sanitisation, feature count == 35, city allowlist)

            Pass 2 — INFORMATIONAL (noted in PR body):
            - Concurrent inference safety, config coupling / magic numbers, dead code, time window
              safety (H+24 2D matrix), API boundary safety (501 for stubs, 400 for bad input)
            - Test gaps (new connector, new model, edge cases: empty DataFrame, NaN-heavy, H+1 with
              H+24 pipeline)

            Cite every finding as [file:line]. Be terse: one problem line, one fix line.
            Do NOT flag items listed under "Suppressions" in review-checklist.md.

            Output format:
            Pre-Landing Review: N issues (X critical, Y informational)

            **CRITICAL** (blocks deployment):
            - [file:line] Problem. Fix: suggestion.

            **Issues** (non-blocking):
            - [file:line] Problem. Fix: suggestion.

            If no issues: Pre-Landing Review: No issues found.

            End with a single-line verdict: READY / NEEDS WORK / BLOCKED
