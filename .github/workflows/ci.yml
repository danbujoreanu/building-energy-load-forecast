name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies (no TF/PyTorch for CI speed)
        run: |
          pip install --upgrade pip
          pip install pandas numpy scikit-learn lightgbm xgboost matplotlib seaborn \
                      statsmodels pyyaml pyarrow tqdm missingno requests python-dotenv
          pip install pytest pytest-cov ruff

      - name: Install package (editable)
        run: pip install -e . --no-deps

      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/

      - name: Run tests (with coverage gate)
        # Gate = 55% on CI-testable modules (viz/DL/utils excluded via pyproject.toml).
        # Full local coverage with all deps is higher. Raise gate via E-37 (DAN-109).
        run: |
          pytest tests/ -v --tb=short \
            --cov=src/energy_forecast \
            --cov-report=term-missing \
            --cov-fail-under=55

  lint:
    name: Code quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          pip install ruff black mypy pandas-stubs types-PyYAML types-requests
          pip install -e . --no-deps
      - name: Check formatting (black)
        run: black --check src/ tests/ scripts/
      - name: Lint (ruff)
        run: ruff check src/ tests/ scripts/
      - name: Type check (mypy — informational, does not block)
        # Data science codebases have many numpy/pandas type edge cases.
        # mypy reports issues but does not fail CI — tighten gradually (E-37).
        run: mypy src/energy_forecast/ --ignore-missing-imports --no-error-summary || true

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f deployment/Dockerfile -t sparc-energy:ci-check .
      - name: Smoke test — container health
        run: |
          docker run -d --name sparc-test -p 8000:8000 sparc-energy:ci-check
          sleep 8
          curl --retry 5 --retry-delay 3 --retry-connrefused http://localhost:8000/health
          docker stop sparc-test
