# ─────────────────────────────────────────────────────────────────────────────
# Sparc Energy — Grafana Unified Alerting rules (Grafana 10+)
# Provisioned automatically on container start.
# All rules query the SparC Energy DB (sparc-postgres datasource).
# Notifications route to the n8n-pushover contact point (wired in session 45).
#
# NOTE: Rules 1–3 and 5 require meter_readings data (unblocked by DAN-96).
#       Rule 4 additionally requires predictions data (unblocked by DAN-97/100).
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

groups:
  - orgId: 1
    name: sparc_energy_alerts
    folder: SparC Alerts
    interval: 5m

    rules:

      # ── Rule 1: Zero readings ──────────────────────────────────────────────
      # Critical: no data uploaded in last 2 hours → meter/upload failure
      - uid: sparc-alert-zero-readings
        title: "Zero Meter Readings (2h)"
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 7200   # 2 hours in seconds
              to: 0
            datasourceUid: sparc-postgres
            model:
              rawSql: >
                SELECT
                  CASE WHEN COUNT(*) = 0 THEN 1 ELSE 0 END AS no_data
                FROM meter_readings
                WHERE recorded_at >= NOW() - INTERVAL '2 hours'
              format: table
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        labels:
          severity: critical
          team: sparc
        annotations:
          summary: "No meter readings in the last 2 hours"
          description: "Check ESB HDF upload or P1 port connection. No readings recorded since {{ $labels.recorded_at }}."

      # ── Rule 2: High daily import ─────────────────────────────────────────
      # Warning: total import today > 30 kWh (unusually high — heat pump fault, EV left on)
      - uid: sparc-alert-high-daily-import
        title: "High Daily Import (>30 kWh)"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 86400   # 24 hours
              to: 0
            datasourceUid: sparc-postgres
            model:
              rawSql: >
                SELECT COALESCE(SUM(import_kwh), 0) AS daily_import_kwh
                FROM meter_readings
                WHERE recorded_at >= DATE_TRUNC('day', NOW())
              format: table
          - refId: B
            relativeTimeRange:
              from: 86400
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 30"
        noDataState: OK
        execErrState: Error
        for: 10m
        labels:
          severity: warning
          team: sparc
        annotations:
          summary: "Daily import exceeds 30 kWh"
          description: "Today's import is {{ $values.A.Value }} kWh. Check for unexpected loads (EV, heating fault)."

      # ── Rule 3: High peak-hour consumption ───────────────────────────────
      # Warning: any 30-min interval >3 kWh during Mon-Fri 17:00-19:00
      - uid: sparc-alert-peak-hour-spike
        title: "Peak Hour Consumption Spike (>3 kWh / 30 min)"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: sparc-postgres
            model:
              rawSql: >
                SELECT COALESCE(MAX(import_kwh), 0) AS max_interval_kwh
                FROM meter_readings
                WHERE
                  recorded_at >= NOW() - INTERVAL '2 hours'
                  AND EXTRACT(HOUR FROM recorded_at AT TIME ZONE 'Europe/Dublin') BETWEEN 17 AND 18
                  AND EXTRACT(DOW FROM recorded_at AT TIME ZONE 'Europe/Dublin') BETWEEN 1 AND 5
              format: table
          - refId: B
            relativeTimeRange:
              from: 7200
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              expression: "$A > 3"
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          team: sparc
        annotations:
          summary: "Peak hour consumption spike detected"
          description: "A 30-min interval reached {{ $values.A.Value }} kWh during the 17:00-19:00 peak window."

      # ── Rule 4: Forecast error spike ─────────────────────────────────────
      # Warning: 7-day rolling MAE > 1.5× baseline (drift trigger)
      # Requires predictions + meter_readings to have overlapping data.
      - uid: sparc-alert-forecast-drift
        title: "Forecast Drift — 7d MAE >1.5× Threshold"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 604800   # 7 days
              to: 0
            datasourceUid: sparc-postgres
            model:
              rawSql: >
                SELECT
                  COALESCE(
                    AVG(ABS(
                      (SELECT SUM(import_kwh)
                       FROM meter_readings mr
                       WHERE mr.household_id = p.household_id
                         AND DATE(mr.recorded_at AT TIME ZONE 'Europe/Dublin') = p.forecast_date
                      ) - p.p50_kwh[12]
                    )),
                    0
                  ) AS rolling_mae
                FROM predictions p
                WHERE p.issued_at >= NOW() - INTERVAL '7 days'
              format: table
          - refId: B
            relativeTimeRange:
              from: 604800
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              # 1.5× the 0.171 kWh/h MAE from training ≈ 0.257 per hour, ×24 = ~6.2 kWh/day
              expression: "$A > 6.2"
        noDataState: OK
        execErrState: Error
        for: 60m
        labels:
          severity: warning
          team: sparc
        annotations:
          summary: "Forecast drift detected — 7-day MAE above threshold"
          description: "Rolling 7-day MAE is {{ $values.A.Value }} kWh. Retrain or investigate feature drift."

      # ── Rule 5: Solar export drop ─────────────────────────────────────────
      # Info: 7-day avg export < 50% of 30-day avg (March–September only)
      - uid: sparc-alert-solar-export-drop
        title: "Solar Export Drop (7d avg < 50% of 30d avg)"
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 2592000   # 30 days
              to: 0
            datasourceUid: sparc-postgres
            model:
              rawSql: >
                SELECT
                  COALESCE(
                    (SELECT AVG(export_kwh) FROM meter_readings
                     WHERE recorded_at >= NOW() - INTERVAL '7 days'), 0
                  ) /
                  NULLIF(
                    (SELECT AVG(export_kwh) FROM meter_readings
                     WHERE recorded_at >= NOW() - INTERVAL '30 days'), 0
                  ) AS export_ratio
              format: table
          - refId: B
            relativeTimeRange:
              from: 2592000
              to: 0
            datasourceUid: __expr__
            model:
              type: math
              # Only alert in solar months (Mar–Sep). Ratio < 0.5 is a drop.
              # The month filter is approximate via Grafana math — full logic in app code.
              expression: "$A < 0.5"
        noDataState: OK
        execErrState: OK
        for: 180m
        labels:
          severity: info
          team: sparc
        annotations:
          summary: "Solar export has dropped significantly"
          description: "7-day average export is {{ $values.A.Value | humanize }}× the 30-day average. Check panels or diverter."
