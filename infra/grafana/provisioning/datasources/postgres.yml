# ─────────────────────────────────────────────────────────────────────────────
# Grafana auto-provisioned datasource — PostgreSQL (sparc_energy)
# Grafana reads this on startup. No manual datasource config needed.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

datasources:
  - name: SparC Energy DB
    type: postgres
    uid: sparc-postgres
    url: db:5432
    user: sparc
    secureJsonData:
      password: ${DB_PASSWORD}
    jsonData:
      database: sparc_energy
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600          # PostgreSQL 16
      timescaledb: true
    isDefault: true
    editable: false
