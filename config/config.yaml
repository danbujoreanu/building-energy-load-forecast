# =============================================================================
# Building Energy Load Forecast — Master Configuration
# =============================================================================
# This is the single source of truth for ALL parameters.
# Never hardcode numbers in src/ or scripts/. Always read from here.
# =============================================================================

# ── Active dataset ────────────────────────────────────────────────────────────
city: drammen          # "drammen" | "oslo"  — switch to run on Oslo dataset

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  raw_data:
    drammen: data/raw/drammen
    oslo:    data/raw/oslo
  processed:  data/processed
  splits:     data/processed/splits
  outputs:
    figures:     outputs/figures
    models:      outputs/models
    results:     outputs/results
    predictions: outputs/predictions

# ── Reproducibility ───────────────────────────────────────────────────────────
seed: 42

# ── Data loading & parsing ────────────────────────────────────────────────────
data:
  timestamp_format: "%Y-%m-%dT%H:%M:%S%z"
  timezone: "Etc/Gmt-1"
  target_column: "Electricity_Imported_Total_kWh"
  weather_columns:
    - Temperature_Outdoor_C
    - Global_Solar_Horizontal_Radiation_W_m2
    - Wind_Speed_m_s
    - Wind_Direction_deg
  # Wh → kWh conversion applied during loading
  wh_to_kwh: true
  # Minimum data completeness required per building (fraction)
  min_completeness: 0.70
  # Drop columns with fewer than this fraction of non-NaN rows.
  # Removes optional sub-meter columns absent for most buildings.
  column_min_coverage: 0.50

# ── Data splits ───────────────────────────────────────────────────────────────
splits:
  # Chronological split — no data leakage across time.
  # Drammen data range: 2018-01-01 → 2022-03-18
  # Matches thesis notebook splits exactly:
  #   Train: 2018-01-01 → 2020-12-31  (~3 years,  X_train shape: ~1.16M × 35)
  #   Val:   2021-01-01 → 2021-06-30  (~6 months, X_val   shape: ~188k × 35)
  #   Test:  2021-07-01 → 2022-03-18  (~8 months, X_test  shape: ~241k × 35)
  train_end: "2020-12-31"
  val_end:   "2021-06-30"

# ── Feature engineering ───────────────────────────────────────────────────────
features:
  # Cyclical time encoding (sin/cos)
  cyclical:
    - hour_of_day       # period 24
    - day_of_week       # period 7
    - month             # period 12
    - day_of_year       # period 365

  # ── Forecast horizon ────────────────────────────────────────────────────────
  # Controls which lag features are permitted at prediction time.
  #
  #   forecast_horizon: 1   → single-step-ahead (H+1) evaluation.
  #                           All lag features are available (matches thesis).
  #                           lag_1h is the dominant predictor (r ≈ 0.977).
  #
  #   forecast_horizon: 24  → 24h-ahead evaluation.  All lags < 24h are
  #                           removed to prevent oracle leakage.  Models must
  #                           rely on longer-range patterns (day-of-week,
  #                           weekly lag, rolling means).
  #
  # Default: 1  — reproduces thesis single-step-ahead evaluation exactly.
  # Change to 24 for honest next-day forecasting experiments.
  forecast_horizon: 24

  # Lag features (hours behind target).
  # Exact windows used in MSc thesis feature engineering notebook.
  # lag_167h / lag_169h: same-time yesterday ±1h (DST robustness).
  lag_windows: [1, 2, 3, 24, 25, 26, 48, 167, 168, 169]

  # Rolling window statistics (hours).
  # Exact windows and statistics used in thesis (mean, std, min, max).
  rolling_windows: [3, 6, 12, 24, 72, 168]
  rolling_stats: [mean, std, min, max]

  # Feature selection thresholds
  selection:
    variance_threshold: 0.0          # Remove zero-variance features
    correlation_threshold: 0.95      # Remove highly correlated duplicates
                                     # 0.95 matches MSc thesis methodology exactly.
                                     # 0.99 was too loose — features at 0.96-0.98 are
                                     # near-duplicates that harm Ridge/Lasso stability.
    n_features_lgbm: 35              # Keep top-N by LightGBM importance

# ── Sequence parameters (deep learning & TFT) ─────────────────────────────────
sequence:
  lookback: 72     # Hours of history used as input (3 days)
  horizon:   24     # Must match forecast_horizon. 1 = H+1 single-step evaluation
                   # (same as features.forecast_horizon above)

# ── Model training ────────────────────────────────────────────────────────────
training:
  # -- Sklearn models --
  ridge:
    alpha: 1.0

  lasso:
    alpha: 0.01
    max_iter: 5000

  random_forest:
    n_estimators: 200
    max_depth: 15
    min_samples_leaf: 4
    n_jobs: -1

  lightgbm:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 8
    num_leaves: 63
    min_child_samples: 20
    subsample: 0.8
    colsample_bytree: 0.8
    n_jobs: -1

  # MSc thesis rank 2: MAE 3.419 kWh, R² 0.982, train time ~3s
  xgboost:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
    min_child_weight: 5
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1       # L1 regularisation
    reg_lambda: 1.0      # L2 regularisation
    n_jobs: -1

  # -- Deep learning (TensorFlow/Keras) --
  deep_learning:
    batch_size: 256
    epochs: 20                  # Hard cap: LSTM best at epoch ~10; prevents TF Metal GPU hang after 70+ min
    early_stopping_patience: 10
    early_stopping_min_delta: 1.0  # Only count improvements > 1.0 as real; stops plateau-running
    reduce_lr_patience: 5
    reduce_lr_factor: 0.2
    min_lr: 1.0e-6
    dropout_rate: 0.2

    lstm:
      units: [64, 32]
      dense_units: 128

    cnn_lstm:
      conv_filters: [64, 32]
      kernel_size: 3
      lstm_units: 32
      dense_units: 64

    gru:
      units: [64, 32]
      dense_units: 128

  # -- Temporal Fusion Transformer (PyTorch Forecasting) --
  # Architecture matches MSc thesis notebook exactly:
  #   hidden_size=32, hidden_continuous_size=16 → 163K parameters
  #   (previously hidden_size=64/hidden_continuous_size=32 → 833K params, ~4× slower)
  tft:
    hidden_size: 32              # Thesis notebook value (was 64 — caused 833K params)
    attention_head_size: 4
    dropout: 0.1
    hidden_continuous_size: 16   # Thesis notebook value (was 32)
    learning_rate: 0.001
    max_epochs: 20               # Notebook stopped at epoch 9 (patience=10); 20 is safe cap
    gradient_clip_val: 0.1
    batch_size: 512              # Increased from 128: 1.14M rows / 512 = 2,235 batches/epoch
                                 # vs 8,941 batches at 128 (4× fewer batches, 4× faster epochs).
                                 # Thesis used 128 but that gave 2.6h/epoch on this dataset.
                                 # 512 is standard for MPS/GPU runs with large datasets.

  # -- Ensemble (stacking) --
  ensemble:
    meta_learner: ridge    # "ridge" | "lightgbm"
    ridge_alpha: 1.0
    # Out-of-fold stacking folds (0 = legacy fixed-validation approach).
    # When > 0, TimeSeriesSplit with this many folds is used to generate OOF
    # meta-features from X_train/y_train.  Only sklearn-compatible base models
    # (Ridge, Lasso, RF, LightGBM, XGBoost) support OOF cloning; DL models
    # are automatically excluded if present.
    oof_folds: 5

# ── Evaluation metrics ────────────────────────────────────────────────────────
evaluation:
  primary_metric: MAE          # Used for model selection
  metrics: [MAE, RMSE, MAPE, R2]

# ── Slow models flag ──────────────────────────────────────────────────────────
# Models flagged as slow are skipped when --skip-slow is passed to scripts.
# Actual training times recorded during MSc thesis (Apple Silicon MPS):
#   tft      → 21,831 s  (~6 hours 4 min)  hidden_size=32, 163K params  ← slowest
#   lstm     → 13,497 s  (~3 hours 45 min)
#   cnn_lstm →  2,238 s  (~37 min)
#   rf       →    116 s  (~2 min)
#   lightgbm →      3 s
#   xgboost  →      3 s
slow_models: [lstm, cnn_lstm, tft]

# ── Model monitoring & drift detection ───────────────────────────────────────
monitoring:
  # Rolling MAE window: number of days to compute rolling MAE over.
  # A 7-day window gives enough signal without reacting to single-day spikes.
  rolling_window_days: 7

  # Retrain trigger: if 7-day rolling MAE > this multiple of training MAE → retrain.
  # 1.5× = 50% degradation before triggering — conservative for monthly retraining cadence.
  mae_threshold_multiplier: 1.5

  # KS test significance level for feature drift detection.
  ks_alpha: 0.05

  # PSI thresholds for feature distribution shift severity.
  psi_warning:  0.10   # PSI >= 0.10 → WARNING
  psi_critical: 0.20   # PSI >= 0.20 → CRITICAL

  # Path for drift report JSON output (relative to repo root).
  report_output_dir: outputs/results/drift_reports
